const maxPrice = Math.max(...DATA.map(d=>d.price));
const cols = [
  {key:'dest', label:'Destination'},
  {key:'price', label:'Price (NIS)', num:true},
  {key:'airline', label:'Airline'},
  {key:'from', label:'Depart', sortKey:'fromDay'},
  {key:'to', label:'Return', sortKey:'toDay'},
  {key:'nights', label:'Nights', num:true},
  {key:'length', label:'Flight length', sortKey:'durMin'},
  {key:'gf', label:'', nosort:true},
];
let sortKey='price', sortDir=1;

function uniq(k){ return [...new Set(DATA.map(d=>d[k]))]; }
function fill(sel, vals, sorter){ const e=document.getElementById(sel); e.innerHTML='<option value="">All</option>'+vals.sort(sorter).map(v=>`<option>${v}</option>`).join(''); }
fill('fDest', uniq('dest'), (a,b)=>a.localeCompare(b));
fill('fAir', uniq('airline'), (a,b)=>a.localeCompare(b));
fill('fFrom', uniq('from'), (a,b)=>DATA.find(d=>d.from==a).fromDay-DATA.find(d=>d.from==b).fromDay);
fill('fTo', uniq('to'), (a,b)=>DATA.find(d=>d.to==a).toDay-DATA.find(d=>d.to==b).toDay);
document.getElementById('total').textContent = DATA.length;

const head=document.getElementById('head');
function renderHead(){
  head.innerHTML = cols.map(c=>{
    if(c.nosort) return '<th></th>';
    const k=c.sortKey||c.key;
    const arrow = (sortKey===k)?` <span class="arrow">${sortDir>0?'▲':'▼'}</span>`:'';
    return `<th data-k="${k}">${c.label}${arrow}</th>`;
  }).join('');
  head.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{
    const k=th.dataset.k;
    if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=1; }
    render();
  });
}

function gfUrl(d){
  // round-trip TLV -> dest city name search on Google Flights
  return 'https://www.google.com/travel/flights?q=' + encodeURIComponent('Flights from Tel Aviv to '+d.dest+' on 2026-08-'+String(d.fromDay).padStart(2,'0')+' returning 2026-08-'+String(d.toDay).padStart(2,'0'));
}

function val(id){ return document.getElementById(id).value.trim(); }
function num(id){ const v=document.getElementById(id).value; return v===''?null:Number(v); }

function filtered(){
  const q=val('search').toLowerCase();
  const fd=val('fDest'), fa=val('fAir'), ff=val('fFrom'), ft=val('fTo');
  const nmin=num('nMin'), nmax=num('nMax'), pmin=num('pMin'), pmax=num('pMax'), dmax=num('dMax');
  return DATA.filter(d=>{
    if(q && !(d.dest.toLowerCase().includes(q)||d.airline.toLowerCase().includes(q))) return false;
    if(fd && d.dest!==fd) return false;
    if(fa && d.airline!==fa) return false;
    if(ff && d.from!==ff) return false;
    if(ft && d.to!==ft) return false;
    if(nmin!=null && d.nights<nmin) return false;
    if(nmax!=null && d.nights>nmax) return false;
    if(pmin!=null && d.price<pmin) return false;
    if(pmax!=null && d.price>pmax) return false;
    if(dmax!=null && d.durMin>dmax) return false;
    return true;
  });
}

function render(){
  renderHead();
  let rows=filtered();
  rows.sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    if(typeof x==='string'){ x=x.toLowerCase(); y=y.toLowerCase(); return x<y?-1*sortDir:x>y?1*sortDir:0; }
    return (x-y)*sortDir;
  });
  document.getElementById('body').innerHTML = rows.map(d=>{
    const w=Math.round(d.price/maxPrice*60);
    return `<tr>
      <td>${d.dest}</td>
      <td class="num price">₪${d.price.toLocaleString()}<span class="bar" style="width:${w}px"></span></td>
      <td>${d.airline}</td>
      <td>${d.from}</td>
      <td>${d.to}</td>
      <td class="num"><span class="pill">${d.nights}</span></td>
      <td>${d.length}</td>
      <td><a class="gf" href="${gfUrl(d)}" target="_blank" rel="noopener">open ↗</a></td>
    </tr>`;
  }).join('');
  const cheapest = rows.length?Math.min(...rows.map(r=>r.price)):0;
  document.getElementById('count').textContent = `${rows.length} of ${DATA.length} flights` + (rows.length?` · cheapest ₪${cheapest.toLocaleString()}`:'');
}

['search','fDest','fAir','fFrom','fTo','nMin','nMax','pMin','pMax','dMax'].forEach(id=>{
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});
document.getElementById('reset').onclick=()=>{
  ['search','fDest','fAir','fFrom','fTo','nMin','nMax','pMin','pMax','dMax'].forEach(id=>document.getElementById(id).value='');
  sortKey='price'; sortDir=1; render();
};
render();
</script>
